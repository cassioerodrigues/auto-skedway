# Nginx configuration for Auto Skedway with /skedway/ subpath
# Place this in your nginx server block

location /skedway/ {
    # Rewrite the path to remove /skedway/ prefix before sending to Flask
    rewrite ^/skedway/(.*)$ /$1 break;
    
    # Send to Flask backend
    proxy_pass http://127.0.0.1:5000;
    
    # Pass original request headers to Flask
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $server_name;
    proxy_set_header X-Forwarded-Prefix /skedway;
    
    # Important for WebSocket or long-lived connections
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    
    # Timeout settings
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
}
